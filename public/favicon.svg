<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Premium Glowing Gradient matching portfolio theme -->
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <!-- Drop Shadow Filter for Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background glassmorphic card with gradient border -->
  <rect x="5" y="5" width="90" height="90" rx="26" fill="#09090b" stroke="url(#glowGrad)" stroke-width="4" />
  
  <!-- Outer Glow circle outline -->
  <circle cx="50" cy="50" r="32" fill="none" stroke="url(#glowGrad)" stroke-width="2" opacity="0.3" filter="url(#glow)" />
  
  <!-- Coding Symbol </> -->
  <text x="50%" y="54%" font-family="Consolas, Monaco, monospace, 'Syne'" font-weight="900" font-size="36" fill="#ffffff" text-anchor="middle" dominant-baseline="middle" filter="url(#glow)">
    &lt;/&gt;
  </text>
</svg>
